name: expo
description: "mobile app"
kind: mobile
priority: 2

example: |
  ```javascript
  const result = await createArtifact({
      artifactType: "expo",
      slug: "my-app",
      previewPath: "/",
      title: "My App"
  });
  const expoPort = result.ports.expo;

  // Expo is scaffolded under artifacts/my-app
  // and API work should be added to the shared api-server.
  await startAsyncSubagent({
      task: "Build the mobile app",
      fromPlan: true,
      relevantFiles: [
          ".local/skills/expo/SKILL.md",
          "artifacts/my-app/app/_layout.tsx",
          "artifacts/my-app/app/(tabs)/_layout.tsx",
          "artifacts/my-app/app/(tabs)/index.tsx",
          "artifacts/api-server/src/index.ts",
          "artifacts/my-app/constants/colors.ts"
      ]
  });

  await presentArtifact({artifactId: result.artifactId});
  ```

access:
  type: all_of
  conditions:
    - type: flag
      name: flag-everything-everywhere
      variation: "true"
    - type: any_of
      conditions:
        - type: stack
          name: PNPM_WORKSPACE
        - type: dot_replit_version
          version: "2.0.0"

bootstrap_constraints: |
  ### Mobile bootstrap rules (`artifact: "expo"`)

  - Expo now uses the shared Express API server in the monorepo. Add backend routes in `artifacts/api-server`.
  - The generated package owns its Expo dependencies; keep them in `files/package.json.template` so `pnpm install` produces a runnable app.

service_configs:
  - name: expo
    development:
      run: pnpm --filter @workspace/__SLUG__ run dev
    production:
      build:
        - pnpm
        - --filter
        - '@workspace/__SLUG__'
        - run
        - build
      run:
        - pnpm
        - --filter
        - '@workspace/__SLUG__'
        - run
        - serve

initial_open_files:
  - app.json
  - constants/colors.ts
  - app/_layout.tsx
  - app/(tabs)/_layout.tsx
  - app/(tabs)/index.tsx
  - components/ErrorBoundary.tsx
  - components/ErrorFallback.tsx

first_user_message:
  template: agent_modes/initial_setup_node/build/expo/first_user_message_v4.jinja2
  static_params:
    stack_version: "4"
